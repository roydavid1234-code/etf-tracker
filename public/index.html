<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>ETF 持股追蹤</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #FAF6EE; --panel: #FFFFFF; --border: #DDD6C5;
    --fg: #2D2A26; --muted: #8A8478;
    --buy: #6B8E5A; --sell: #C76760; --accent: #4A6FA5;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg);
         font-family: "Hiragino Sans", "Yu Gothic Medium", "Yu Gothic", "Noto Sans JP", "Noto Sans TC", "PingFang TC", -apple-system, sans-serif; }
  h1 { margin: 0 0 4px; font-size: 20px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 16px; cursor: pointer; color: var(--muted);
         border-bottom: 2px solid transparent; font-size: 14px; user-select: none; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .controls { background: var(--panel); border: 1px solid var(--border);
              border-radius: 8px; padding: 14px; margin-bottom: 16px;
              display: grid; gap: 10px;
              grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .controls label { display: flex; flex-direction: column; gap: 4px;
                    font-size: 12px; color: var(--muted); }
  .controls input[type=text], .controls input[type=date], .controls select {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font-size: 14px;
  }
  .controls button.primary {
    grid-column: 1 / -1;
    background: var(--accent); color: #FAF6EE; border: 0;
    border-radius: 6px; padding: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .controls button.primary:hover { filter: brightness(1.1); }

  .modes { display: flex; gap: 6px; grid-column: 1 / -1; flex-wrap: wrap; }
  .modes label { flex-direction: row; align-items: center; gap: 6px;
                 background: var(--bg); border: 1px solid var(--border);
                 padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
                 color: var(--fg); }
  .modes label.active { border-color: var(--accent); color: var(--accent); }
  .modes input { display: none; }

  /* ETF 多選清單 */
  .etf-multi { grid-column: 1 / -1; background: var(--bg); border: 1px solid var(--border);
               border-radius: 6px; padding: 12px; }
  .etf-multi-header { display: flex; justify-content: space-between; align-items: center;
                      margin-bottom: 8px; font-size: 12px; color: var(--muted); }
  .etf-multi-header .link { background: none; border: 0; color: var(--accent); cursor: pointer;
                            font-size: 12px; padding: 0 6px; }
  .etf-multi-header .link:hover { text-decoration: underline; }
  .etf-list { display: grid; gap: 6px;
              grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  .etf-list label { flex-direction: row; align-items: center; gap: 6px;
                    padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
                    cursor: pointer; font-size: 13px; color: var(--fg);
                    font-family: ui-monospace, SF Mono, Menlo, monospace; }
  .etf-list label:has(input:checked) { border-color: var(--accent); color: var(--accent); background: rgba(74, 111, 165, 0.08); }
  .etf-list input { margin: 0; accent-color: var(--accent); }
  .etf-multi-collapsed { padding: 0; }
  .etf-multi-collapsed .etf-list { display: none; }

  /* collapsible：只顯示第一排，點 ▾ 展開 */
  .etf-multi.collapsible.collapsed .etf-list {
    max-height: 40px; overflow: hidden; position: relative;
  }
  .etf-multi.collapsible.collapsed .etf-list::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 16px;
    background: linear-gradient(transparent, var(--bg));
    pointer-events: none;
  }
  .link.toggle { color: var(--accent); }

  section.results { display: grid; gap: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 8px; overflow: hidden; }
  .panel header { padding: 12px 16px; border-bottom: 1px solid var(--border);
                  display: flex; justify-content: space-between; align-items: baseline;
                  gap: 8px; flex-wrap: wrap; }
  .panel header h2 { margin: 0; font-size: 15px; font-weight: 600; }
  .panel header h2.buy  { color: var(--buy); }
  .panel header h2.sell { color: var(--sell); }
  .count { color: var(--muted); font-size: 12px; white-space: nowrap; }
  /* 表格橫向可滑（手機 7 欄不被裁切；iOS 慣性滑動）*/
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
  th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border);
           white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; font-size: 12px;
       text-transform: uppercase; letter-spacing: 0.4px; background: var(--bg); }
  tr:last-child td { border-bottom: 0; }
  .etf, .stock { font-family: ui-monospace, SF Mono, Menlo, monospace; font-weight: 600; }
  .num  { font-variant-numeric: tabular-nums; font-weight: 600; }
  .num.buy  { color: var(--buy); }
  .num.sell { color: var(--sell); }
  .daily { color: var(--muted); font-size: 12px; font-family: ui-monospace, SF Mono, Menlo, monospace; }
  .empty { padding: 24px; color: var(--muted); text-align: center; font-size: 13px; }
  .err { background: #F8E1DD; border: 1px solid var(--sell); color: var(--sell);
         padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
  .err:empty { display: none; }
  .ok  { background: #E1F0DD; border: 1px solid var(--buy); color: var(--buy);
         padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
  .ok:empty { display: none; }
  .etf-pill { display: inline-block; background: var(--bg); border: 1px solid var(--border);
              padding: 2px 8px; border-radius: 4px; margin-right: 6px; font-size: 12px;
              font-family: ui-monospace, SF Mono, Menlo, monospace; }
  .etf-pill.buy  { border-color: var(--buy); color: var(--buy); }
  .etf-pill.sell { border-color: var(--sell); color: var(--sell); }
  .etf-card-title { font-family: ui-monospace, SF Mono, Menlo, monospace;
                    font-size: 15px; font-weight: 700; color: var(--accent); }
  details.help { margin: 12px 0 16px; color: var(--muted); font-size: 13px; }
  details.help summary { cursor: pointer; }
  details.help code { background: var(--panel); border: 1px solid var(--border);
                      border-radius: 4px; padding: 2px 6px; font-size: 12px; }

  /* ─── Calendar popup ─── */
  #cal { position: absolute; z-index: 999; background: var(--panel);
         border: 1px solid var(--border); border-radius: 8px; padding: 12px;
         box-shadow: 0 8px 24px rgba(45, 42, 38, 0.12);
         min-width: 280px; max-width: calc(100vw - 24px); }
  #cal.hidden { display: none; }
  .cal-head { display: flex; justify-content: space-between; align-items: center;
              margin-bottom: 10px; }
  .cal-head button { background: transparent; border: 1px solid var(--border);
                     color: var(--fg); width: 28px; height: 28px; border-radius: 4px;
                     cursor: pointer; font-size: 16px; line-height: 1; }
  .cal-head button:hover { border-color: var(--accent); color: var(--accent); }
  .cal-title { font-weight: 600; color: var(--fg); font-size: 14px; }
  .cal-week, .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-week { color: var(--muted); font-size: 11px; text-align: center;
              padding: 4px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
             font-size: 13px; color: var(--fg); cursor: pointer; border-radius: 4px;
             position: relative; }
  .cal-day:hover:not(.cal-empty) { background: rgba(88,166,255,0.15); }
  .cal-day.cal-empty { color: var(--muted); opacity: 0.3; cursor: default; }
  .cal-day.cal-other-month { opacity: 0.25; }
  .cal-day.cal-has-data::after { content: ''; position: absolute; bottom: 3px;
                                  width: 4px; height: 4px; background: var(--buy);
                                  border-radius: 50%; }
  .cal-day.cal-selected { background: var(--accent); color: #FAF6EE; font-weight: 700; }
  .cal-day.cal-today { border: 1px solid var(--muted); }
  .cal-footer { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
                font-size: 11px; color: var(--muted); text-align: center; }
  .cal-footer span { color: var(--buy); }

  /* ─── 手機 (≤640px) ─── */
  @media (max-width: 640px) {
    body { padding: 12px; }
    h1 { font-size: 18px; }
    #refreshBtn { display: block; margin: 8px 0 0 0 !important; width: 100%; }
    .controls { padding: 10px; gap: 8px; grid-template-columns: 1fr; }
    .modes { gap: 4px; }
    .modes label { padding: 5px 9px; font-size: 12px; }
    .tab { padding: 8px 10px; font-size: 13px; }
    th, td { padding: 8px 10px; }
    .panel header { padding: 10px 12px; }
    .panel header h2 { font-size: 14px; }
    .etf-list { grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); }
    /* 返回鈕縮小，避免蓋住標題 */
    body > button[onclick*="history.back"] { transform: scale(0.85); transform-origin: top right; }
  }
</style>
</head>

<button id="backBtn" type="button"
  style="position:fixed; top:16px; right:16px; z-index:9999;
         padding:10px 20px; font-size:14px; font-weight:600; letter-spacing:0.1em;
         background:#4A6FA5; color:#FFFFFF;
         border:1px solid #4A6FA5; border-radius:6px; cursor:pointer;
         box-shadow:0 2px 8px rgba(74, 111, 165, 0.25); transition:background 0.15s, box-shadow 0.15s;"
  onmouseover="this.style.background='#3D5E8D';this.style.boxShadow='0 4px 12px rgba(74, 111, 165, 0.35)'"

    <button id="cal-next">›</button>
  </div>
  <div class="cal-week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-footer"><span>●</span> = 有資料</div>

<script>
const $ = id => document.getElementById(id);
const err = m => { $('err').textContent = m || ''; $('ok').textContent = ''; };
const ok  = m => { $('ok').textContent  = m || ''; $('err').textContent = ''; };

// ─── 日曆 widget (singleton popup) ───────────────────────────────────────
const Cal = {
  dates: new Set(),     // 有資料的日期集合
  target: null,         // 目前綁定的 input element
  viewYear: 0, viewMonth: 0,   // 月曆當前顯示年月

  async loadDates() {
    try {
      const d = await (await fetch('api/dates')).json();
      this.dates = new Set(d.dates);
    } catch (e) { /* ignore */ }
  },

  open(inputEl) {
    this.target = inputEl;
    const val = inputEl.value || new Date().toISOString().slice(0, 10);
    const [y, m] = val.split('-').map(Number);
    this.viewYear = y;
    this.viewMonth = m - 1;
    this.render();
    const pop = $('cal');
    pop.classList.remove('hidden');
    // 定位：對齊 input 下方
    const r = inputEl.getBoundingClientRect();
    pop.style.left = (window.scrollX + r.left) + 'px';
    pop.style.top  = (window.scrollY + r.bottom + 4) + 'px';
  },

  close() { $('cal').classList.add('hidden'); this.target = null; },

  render() {
    const y = this.viewYear, m = this.viewMonth;
    $('cal-title').textContent = `${y} / ${String(m + 1).padStart(2, '0')}`;
    const first = new Date(y, m, 1);
    const firstWeekday = first.getDay(); // 0=Sun
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const daysInPrev  = new Date(y, m, 0).getDate();
    const selected    = this.target ? this.target.value : null;
    const today       = new Date().toISOString().slice(0, 10);

    const grid = $('cal-grid');
    grid.innerHTML = '';

    const fmt = (yy, mm, dd) =>
      `${yy}-${String(mm + 1).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;

    // 上個月填充
    for (let i = firstWeekday - 1; i >= 0; i--) {
      const dd = daysInPrev - i;
      const iso = fmt(m === 0 ? y - 1 : y, m === 0 ? 11 : m - 1, dd);
      grid.insertAdjacentHTML('beforeend', this.dayCell(iso, dd, 'cal-other-month', selected, today));
    }
    // 本月
    for (let dd = 1; dd <= daysInMonth; dd++) {
      const iso = fmt(y, m, dd);
      grid.insertAdjacentHTML('beforeend', this.dayCell(iso, dd, '', selected, today));
    }
    // 下個月填充至 6 排
    const cellsSoFar = firstWeekday + daysInMonth;
    const trailing   = (7 - cellsSoFar % 7) % 7;
    for (let dd = 1; dd <= trailing; dd++) {
      const iso = fmt(m === 11 ? y + 1 : y, m === 11 ? 0 : m + 1, dd);
      grid.insertAdjacentHTML('beforeend', this.dayCell(iso, dd, 'cal-other-month', selected, today));
    }
  },

  dayCell(iso, dd, extraClass, selected, today) {
    const classes = ['cal-day'];
    if (extraClass) classes.push(extraClass);
    if (this.dates.has(iso)) classes.push('cal-has-data');
    if (iso === selected) classes.push('cal-selected');
    if (iso === today)    classes.push('cal-today');
    return `<div class="${classes.join(' ')}" data-iso="${iso}">${dd}</div>`;
  },

  pick(iso) {
    if (!this.target) return;
    this.target.value = iso;
    // 觸發 change 事件給可能的 listener
    this.target.dispatchEvent(new Event('change', { bubbles: true }));
    this.close();
  },

  prev() {
    if (--this.viewMonth < 0) { this.viewMonth = 11; this.viewYear--; }
    this.render();
  },
  next() {
    if (++this.viewMonth > 11) { this.viewMonth = 0; this.viewYear++; }
    this.render();
  },
};

// 綁定 calendar 全域事件
$('cal-prev').addEventListener('click', () => Cal.prev());
$('cal-next').addEventListener('click', () => Cal.next());
$('cal-grid').addEventListener('click', (ev) => {
  const cell = ev.target.closest('.cal-day');
  if (cell && !cell.classList.contains('cal-empty')) Cal.pick(cell.dataset.iso);
});
// 點 popup 外面 → 關閉
document.addEventListener('click', (ev) => {
  if ($('cal').classList.contains('hidden')) return;
  if (ev.target.closest('#cal')) return;
  if (ev.target.matches('input[type=date]')) return;
  Cal.close();
});

function fmtLots(lots) { const sign = lots > 0 ? '+' : ''; return `${sign}${lots} 張`; }
function fmtDaily(daily) {
  return daily.map(d => `${d.date.slice(5).replace('-', '/')} ${fmtLots(d.change_lots)}`).join(' // ');
}
function fmtWeight(w) { return w == null ? '—' : w.toFixed(2) + '%'; }
function fmtWeightChange(w) {
  if (w == null) return '—';
  const sign = w > 0 ? '+' : '';
  return sign + w.toFixed(2) + '%';
}

// 股票代號 → 名稱 cache。loadPickers 時填入。
const stockNameOf = new Map();
const stockLabel = code => {
  const name = stockNameOf.get(code);
  return name ? `${code} ${name}` : code;
};

// ─── 載入多選清單 (ETF / 股票) ───
async function loadPickers() {
  const [etfData, stockData] = await Promise.all([
    fetch('api/etfs/list').then(r => r.json()),
    fetch('api/stocks/list').then(r => r.json()),
  ]);
  const etfHtml = etfData.etfs.map(e =>
    `<label><input type="checkbox" value="${e}"> ${e}</label>`).join('');
  // 股票清單現回 [{code, name}]：填 cache 並顯示「代號 名稱」
  stockNameOf.clear();
  for (const s of stockData.stocks) {
    if (s.name) stockNameOf.set(s.code, s.name);
  }
  const stockHtml = stockData.stocks.map(s => {
    const label = s.name ? `${s.code} ${s.name}` : s.code;
    return `<label title="${label}"><input type="checkbox" value="${s.code}"> ${label}</label>`;
  }).join('');
  $('etfPick').innerHTML       = etfHtml;
  $('addedEtfPick').innerHTML  = etfHtml;
  $('stockEtfPick').innerHTML  = etfHtml;
  $('stockPick').innerHTML     = stockHtml;

  // 預設勾選
  const firstEtf = $('etfPick').querySelector('input');
  if (firstEtf) firstEtf.checked = true;
  const default2330 = $('stockPick').querySelector('input[value="2330"]');
  if (default2330) default2330.checked = true;
  // checkbox 寬度依清單最長文字自動撐大
  $('stockPick').style.gridTemplateColumns = 'repeat(auto-fill, minmax(160px, 1fr))';

  ['etfPick', 'addedEtfPick', 'stockEtfPick', 'stockPick'].forEach(attachPickHandlers);
}

function attachPickHandlers(listId) {
  const list = $(listId);
  const countId = list.closest('.etf-multi').querySelector('[id$="Count"]').id;
  list.addEventListener('change', () => updatePickCount(listId, countId));
  list.closest('.etf-multi').querySelectorAll('button.link[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const checked = btn.dataset.action === 'all';
      list.querySelectorAll('input').forEach(cb => cb.checked = checked);
      updatePickCount(listId, countId);
    });
  });
  updatePickCount(listId, countId);
}

function updatePickCount(listId, countId) {
  const n = $(listId).querySelectorAll('input:checked').length;
  $(countId).textContent = `已選 ${n} 支`;
}

function getPicked(listId) {
  return [...$(listId).querySelectorAll('input:checked')].map(cb => cb.value);
}

// ─── 個股視角 ───
// 模式值：range / daily / days1..days7。daysOf 取 N（0 表示非 daysN 模式）
const daysOf = m => m.startsWith('days') ? Number(m.slice(4)) : 0;

function syncStockUI() {
  const m = document.querySelector('input[name=stockMode]:checked').value;
  document.querySelectorAll('#ctrlStock .modes label').forEach(l =>
    l.classList.toggle('active', l.querySelector('input').value === m));

function renderPanels(panels) {
  $('results').innerHTML = panels.map(p => `
    <div class="panel">
      <header><h2 class="${p.side}">${p.title}</h2><span class="count">${p.count}</span></header>
      <div class="table-scroll">
        <table>${p.head ? `<thead>${p.head}</thead>` : ''}<tbody>${p.body}</tbody></table>
      </div>
    </div>
  `).join('');
}

async function runStock() {
  err('');
  const picked = getPicked('stockPick');
  const extra  = $('stockExtra').value.split(',').map(s => s.trim()).filter(Boolean);
  const stocks = [...new Set([...picked, ...extra])];
  if (stocks.length === 0) return err('請至少選一支股票或輸入額外代號');

  const etfFilter = getPicked('stockEtfPick');
  const m = document.querySelector('input[name=stockMode]:checked').value;
  const daysN = daysOf(m);
  const endpoint = (m === 'daily') ? 'daily' : 'range';
  const q = new URLSearchParams();
  q.set('stocks', stocks.join(','));
  if (etfFilter.length > 0) q.set('etfs', etfFilter.join(','));
  if (m === 'daily') q.set('date', $('stockDate').value);
  else if (daysN > 0) { q.set('days', daysN); q.set('end', $('stockEnd').value); }
  else { q.set('start', $('stockStart').value); q.set('end', $('stockEnd').value); }

  const res = await fetch(`api/${endpoint}?${q}`);
  const data = await res.json();
  if (!res.ok) return err(data.error);

  const dateLabel = (m === 'daily') ? $('stockDate').value
    : (daysN > 0) ? `近 ${daysN} 日 (~${$('stockEnd').value})`
    : `${$('stockStart').value} ~ ${$('stockEnd').value}`;
  const filterTag = (etfFilter.length === 0) ? '' : ` (限 ${etfFilter.length} 支 ETF)`;

  // 統一表格：ETF / 股票 / 變動 / 目前持有 / [每日明細] / 權重變化 / 目前權重
  const head = (m === 'daily')
    ? `<tr><th>ETF</th><th>股票</th><th>變動</th><th>目前持有</th><th>權重變化</th><th>目前權重</th></tr>`
    : `<tr><th>ETF</th><th>股票</th><th>今日累計</th><th>目前已累積</th><th>每日明細</th><th>權重變化</th><th>目前權重</th></tr>`;
  const rowOf = (r, side) => (m === 'daily')
    ? `<tr><td class="etf">${r.etf_code}</td><td class="stock">${stockLabel(r.stock_code)}</td><td class="num ${side}">${fmtLots(r.change_lots)}</td><td class="num">${r.today_lots != null ? r.today_lots + ' 張' : '—'}</td><td class="num">${fmtWeightChange(r.weight_change)}</td><td class="num">${fmtWeight(r.today_weight)}</td></tr>`
    : `<tr><td class="etf">${r.etf_code}</td><td class="stock">${stockLabel(r.stock_code)}</td><td class="num ${side}">${fmtLots(r.total_lots)}</td><td class="num">${r.end_lots != null ? r.end_lots + ' 張' : '—'}</td><td class="daily">${fmtDaily(r.daily)}</td><td class="num">${fmtWeightChange(r.weight_change)}</td><td class="num">${fmtWeight(r.end_weight)}</td></tr>`;

  // 後端：1 支且無 etfFilter → 舊形狀 (data.buys/sells)；其餘 → data.results[]
  const results = data.results || [{ stock: data.stock || stocks[0], buys: data.buys, sells: data.sells }];

  // 把所有股票的買賣攤平成兩張大表
  const allBuys = [], allSells = [];
  for (const one of results) {
    for (const r of one.buys)  allBuys.push({ ...r, stock_code: one.stock });
    for (const r of one.sells) allSells.push({ ...r, stock_code: one.stock });
  }
  // 排序：股票代號 ASC → ETF 代號 ASC（資料集中、好對齊）
  const sortFn = (a, b) =>
    a.stock_code < b.stock_code ? -1 : a.stock_code > b.stock_code ? 1 :
    a.etf_code   < b.etf_code   ? -1 : a.etf_code   > b.etf_code   ? 1 : 0;
  allBuys.sort(sortFn);
  allSells.sort(sortFn);

  const panels = [];
  if (allBuys.length > 0) panels.push({
    side: 'buy',  title: `${dateLabel} 買入📈${filterTag}`, count: `${allBuys.length} 筆`,
    head, body: allBuys.map(r => rowOf(r, 'buy')).join(''),
  });
  if (allSells.length > 0) panels.push({
    side: 'sell', title: `${dateLabel} 賣出📉${filterTag}`, count: `${allSells.length} 筆`,
    head, body: allSells.map(r => rowOf(r, 'sell')).join(''),
  });
  if (panels.length === 0) {
    $('results').innerHTML = `<div class="empty" style="padding:32px; text-align:center; color:var(--muted)">本次查詢無任何買賣資料</div>`;
  } else {
    renderPanels(panels);
  }
}
$('runStock').addEventListener('click', runStock);

  else q += `&start=${$('etfStart').value}&end=${$('etfEnd').value}`;
  const res = await fetch(`api/etf?${q}`);

  if (!res.ok) return err(data.error);

    : (daysN > 0) ? `近 ${daysN} 日 (~${$('etfEnd').value})`
    : `${$('etfStart').value} ~ ${$('etfEnd').value}`;

  // 統一表格：ETF / 股票 / 變動 / 目前持有 / [每日明細] / 權重變化 / 目前權重
  const head = (m === 'daily')
    ? `<tr><th>ETF</th><th>股票</th><th>變動</th><th>目前持有</th><th>權重變化</th><th>目前權重</th></tr>`

  const rowOf = (r, side) => (m === 'daily')
    ? `<tr><td class="etf">${r.etf_code}</td><td class="stock">${stockLabel(r.stock_code)}</td><td class="num ${side}">${fmtLots(r.change_lots)}</td><td class="num">${r.today_lots != null ? r.today_lots + ' 張' : '—'}</td><td class="num">${fmtWeightChange(r.weight_change)}</td><td class="num">${fmtWeight(r.today_weight)}</td></tr>`
    : `<tr><td class="etf">${r.etf_code}</td><td class="stock">${stockLabel(r.stock_code)}</td><td class="num ${side}">${fmtLots(r.total_lots)}</td><td class="num">${r.end_lots != null ? r.end_lots + ' 張' : '—'}</td><td class="daily">${fmtDaily(r.daily)}</td><td class="num">${fmtWeightChange(r.weight_change)}</td><td class="num">${fmtWeight(r.end_weight)}</td></tr>`;

  // 把所有 ETF 的買賣攤平成兩張大表
  const allBuys = [], allSells = [];
  for (const one of data.results) {
    for (const r of one.buys)  allBuys.push({ ...r, etf_code: one.etf });
    for (const r of one.sells) allSells.push({ ...r, etf_code: one.etf });
  }
  // 排序：ETF 代號 ASC → 股票代號 ASC
  const sortFn = (a, b) =>
    a.etf_code   < b.etf_code   ? -1 : a.etf_code   > b.etf_code   ? 1 :
    a.stock_code < b.stock_code ? -1 : a.stock_code > b.stock_code ? 1 : 0;
  allBuys.sort(sortFn);
  allSells.sort(sortFn);

  const panels = [];
  if (allBuys.length > 0) panels.push({
    side: 'buy',  title: `${dateLabel} 買入📈`, count: `${allBuys.length} 筆`,
    head, body: allBuys.map(r => rowOf(r, 'buy')).join(''),
  });
  if (allSells.length > 0) panels.push({
    side: 'sell', title: `${dateLabel} 賣出📉`, count: `${allSells.length} 筆`,
    head, body: allSells.map(r => rowOf(r, 'sell')).join(''),
  });
  if (panels.length === 0) {
    $('results').innerHTML = `<div class="empty" style="padding:32px; text-align:center; color:var(--muted)">本次查詢無任何買賣資料</div>`;
  } else {
    renderPanels(panels);
  }
}
$('runEtf').addEventListener('click', runEtf);

// ─── 當日新增股票 ───
async function runAdded() {
  err('');
  const date = $('addedDate').value;
  const newOnly = $('newOnly').checked;
  const etfFilter = getPicked('addedEtfPick');
  let q = `date=${date}`;
  if (newOnly) q += '&newOnly=true';
  if (etfFilter.length > 0) q += `&etfs=${etfFilter.join(',')}`;
  const res = await fetch(`api/added-stocks?${q}`);
  const data = await res.json();
  if (!res.ok) return err(data.error);

  const filterLabel = (etfFilter.length === 0) ? '全部 ETF'
    : `限 ${etfFilter.length} 支 ETF`;
  const tag = newOnly ? '新進場（newOnly）' : '買入（含加碼）';
  const title = `${date} ${filterLabel} ${tag}`;
  const head = `<tr><th>股票</th><th>當日總買入</th><th>ETF 數</th><th>明細</th></tr>`;
  const rowOf = r => `<tr>
    <td class="stock">${stockLabel(r.stock_code)}</td>
    <td class="num buy">${fmtLots(r.total_lots)}</td>
    <td class="daily">${r.etf_count}</td>
    <td class="daily">${r.etfs.map(e => `<span class="etf-pill buy">${e.etf_code} ${fmtLots(e.change_lots)}</span>`).join('')}</td>
  </tr>`;
  if (data.items.length === 0) {
    $('results').innerHTML = `<div class="empty" style="padding:32px; text-align:center; color:var(--muted)">本次查詢無任何買賣資料</div>`;
    return;
  }
  const body = data.items.map(rowOf).join('');
  renderPanels([{ side:'buy', title, count:`${data.items.length} 股票`, head, body }]);
}
$('runAdded').addEventListener('click', runAdded);

// ─── CSV 匯入 ───

// ─── 啟動 ───
async function loadDbStatus() {
  try {
    const d = await (await fetch('api/db-info')).json();
    const sub = $('dbStatus');
    if (d.rows === 0) {
      sub.textContent = 'DB 空白。請至「匯入 CSV」上傳檔案，或執行 `node fetch.js 0050 0056 --ingest`。';
      return;
    }
    sub.textContent =
      `DB 共 ${d.rows} 筆 snapshot · ${d.etfs} 支 ETF · ${d.stocks} 支股票 · ` +
      `日期 ${d.min_date} ~ ${d.max_date}` +
      (d.min_date === d.max_date ? '（只有單日，要兩日以上才能算買賣 diff）' : '');
    // 日期預設今日（不再對齊 DB 範圍）
  } catch (e) { /* ignore */ }
}

(async () => {
  syncStockUI();
  syncEtfUI();

  // 所有日期 input 預設前一天（ETF PCF 通常 T+1 揭露，前一天才有資料）
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  document.querySelectorAll('input[type=date]').forEach(el => { el.value = yesterday; });

  await Promise.all([loadDbStatus(), loadPickers(), Cal.loadDates()]);

  // collapsible toggle 按鈕
  document.querySelectorAll('.etf-multi.collapsible .link.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const wrap = btn.closest('.etf-multi');
      wrap.classList.toggle('collapsed');
      btn.textContent = wrap.classList.contains('collapsed') ? '▾ 展開' : '▴ 收合';
    });
  });

  // 攔截所有日期 input，點擊改用自製日曆
  document.querySelectorAll('input[type=date]').forEach(el => {
    el.addEventListener('focus', (ev) => { ev.preventDefault(); Cal.open(el); });
    el.addEventListener('mousedown', (ev) => { ev.preventDefault(); Cal.open(el); el.blur(); });
  });

  // 刷新按鈕：立刻抓最新資料並重新整理頁面
  $('refreshBtn').addEventListener('click', async () => {
    const btn = $('refreshBtn');
    const orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ 抓取中…（約 5~20 秒）';
    err('');
    try {
      const r = await fetch('api/refresh', { method: 'POST' });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      ok(`✓ 抓到 ${data.ingested} rows，DB 共 ${data.total_rows} 筆。錯誤 ${data.errors.length} 筆。`);
      // 重載日曆可用日期 + DB 狀態
      await Promise.all([Cal.loadDates(), loadDbStatus()]);
    } catch (e) {
      err('刷新失敗：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
    }
  });

  runStock();
})();
